<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Work | Billat Construction</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>

    <header>
        <div class="container header-flex">
            <h1><a href="index.html" class="logo-link">Billat Construction</a></h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="gallery.html">Portfolio</a>
            </nav>
        </div>
    </header>

    <section class="container form-section">
        <div class="text-center">
            <h2>Join Our Team</h2>
            <p>We are always looking for hardworking, detail-oriented individuals to join our crew. Fill out the form below to apply.</p>
        </div>

        <form action="mailto:s_mbillat@frontiernet.net" method="post" enctype="text/plain" class="apply-form">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="experience">Construction Experience (Years/Types of work):</label>
            <textarea id="experience" name="experience" rows="5" required></textarea>

            <button type="submit" class="btn">Submit Application</button>
        </form>
    </section>

    <footer>
        <div class="container text-center">
            <p class="license">Nevada State Contractor's License Number: 0047187</p>
            <p class="copyright">&copy; 2026 Billat Construction.</p>
        </div>
    </footer>

</body>
</html>
